name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: front-bibliotheque/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('front-bibliotheque/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          cd front-bibliotheque
          npm ci

      - name: Lint
        run: |
          cd front-bibliotheque
          npm run lint --if-present

      - name: Test
        run: |
          cd front-bibliotheque
          npm test --if-present

      - name: Build
        run: |
          cd front-bibliotheque
          npm run build --if-present
