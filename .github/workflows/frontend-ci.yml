name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

    
jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache node modules
        id: cache
        uses: actions/cache@v4
        with:
          path: front-bibliotheque/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('front-bibliotheque/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          cd front-bibliotheque
          npm ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd front-bibliotheque
          npm ci

      - name: Build
        run: |
          cd front-bibliotheque
          npm run build --if-present

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd front-bibliotheque
          npm ci

      - name: Lint
        run: |
          cd front-bibliotheque
          npm run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd front-bibliotheque
          npm ci

      - name: Test
        run: |
          cd front-bibliotheque
          npm test --if-present

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd front-bibliotheque
          npm ci

      - name: Install Playwright browsers
        run: |
          cd front-bibliotheque
          npx playwright install --with-deps

      - name: Build for E2E
        run: |
          cd front-bibliotheque
          npm run build --if-present

      - name: Serve built app
        run: |
          cd front-bibliotheque
          if [ -d dist/front-bibliotheque ]; then npx http-server dist/front-bibliotheque -p 4173 &
          else npx http-server dist -p 4173 & fi
          sleep 3

      - name: Run Playwright tests
        run: |
          cd front-bibliotheque
          npx playwright test
