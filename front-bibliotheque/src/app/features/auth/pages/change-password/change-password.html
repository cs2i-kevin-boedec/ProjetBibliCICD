<section class="form-container">
  <h1>Changer le mot de passe</h1>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>
        Login
        <input [(ngModel)]="login" name="login" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Ancien mot de passe
        <input [(ngModel)]="ancienMotDePasse" name="ancienMotDePasse" type="password" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Nouveau mot de passe
        <input [(ngModel)]="nouveauMotDePasse" name="nouveauMotDePasse" type="password" />
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Valider</button>
    </div>
  </form>

  @if (message()) {
    <p class="message message-success">{{ message() }}</p>
  }
</section>
