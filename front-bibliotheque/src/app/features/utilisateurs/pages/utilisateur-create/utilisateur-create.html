<section class="form-container-large">
  <h1>Créer un utilisateur</h1>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>
        Type
        <select [(ngModel)]="typeUtilisateur" name="typeUtilisateur">
          <option value="ETUDIANT">Étudiant</option>
          <option value="ENSEIGNANT">Enseignant</option>
          <option value="PARTICULIER">Particulier</option>
        </select>
      </label>
    </div>

    <div class="form-group">
      <label>
        Nom
        <input [(ngModel)]="nom" name="nom" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Prénom
        <input [(ngModel)]="prenom" name="prenom" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Adresse
        <input [(ngModel)]="adresse" name="adresse" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Email
        <input [(ngModel)]="email" name="email" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Login
        <input [(ngModel)]="login" name="login" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Mot de passe
        <input [(ngModel)]="motDePasse" name="motDePasse" type="password" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Caution
        <input [(ngModel)]="cautionInitiale" name="cautionInitiale" type="number" />
      </label>
    </div>

    @if (typeUtilisateur === 'ETUDIANT') {
      <div class="form-group">
        <label>
          Année universitaire
          <input [(ngModel)]="anneeUniversitaire" name="anneeUniversitaire" type="number" />
        </label>
      </div>
    }

    @if (typeUtilisateur === 'ENSEIGNANT') {
      <div class="form-group">
        <label>
          Département
          <input [(ngModel)]="departement" name="departement" />
        </label>
      </div>
    }

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Créer</button>
    </div>
  </form>

  @if (message()) {
    <p class="message message-success">{{ message() }}</p>
  }
</section>
